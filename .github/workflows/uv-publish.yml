name: Publish

on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - v*

jobs:
  uv-publish:
    name: python
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run tests
        run: uv run pytest tests
  
      - name: Build
        run: uv build
      # Check that basic features work and we didn't miss to include crucial files
      - name: Test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl pytest tests
      
      - name: Test (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz pytest tests
      
      - name: Publish
        run: uv publish

